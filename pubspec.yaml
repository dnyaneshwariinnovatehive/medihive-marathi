name: medihive
description: MediHive - Healthcare Management System
publish_to: 'none'
version: 1.0.3+2

environment:
  sdk: ^3.8.0

dependencies:
  flutter:
    sdk: flutter

  # State Management
  provider: ^6.1.2

  # Navigation
  go_router: ^14.8.1

  # Charts
  fl_chart: ^0.70.2

  # Local Storage
  shared_preferences: ^2.5.3

  # PDF Generation
  pdf: ^3.11.3
  printing: ^5.14.3

  # Image Picker
  image_picker: ^1.1.2

  # Google Fonts
  google_fonts: ^6.2.1

  # Cupertino Icons
  cupertino_icons: ^1.0.8

  # Intl for date formatting
  intl: ^0.20.2

  # Hive Local Storage & Offline Support
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.2
  path: ^1.9.0
  connectivity_plus: ^7.0.0

  # Google Sign-In & Google APIs
  google_sign_in: ^6.3.0
  googleapis: ^12.0.0
  googleapis_auth: ^1.6.0
  http: ^1.2.0
  flutter_secure_storage: ^9.0.0

  # Excel Export
  excel: ^4.0.2

  # Background tasks
  # workmanager: ^0.9.0

  # Share sheets
  share_plus: ^10.0.0

  # Local notifications for appointment reminders
  flutter_local_notifications: ^18.0.1
  timezone: ^0.9.4
  sqflite: ^2.4.3
  file_picker: 11.0.0

  # Firebase Cloud Messaging for push notifications
  firebase_core: ^3.12.1
  firebase_messaging: ^15.2.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.6

flutter:
  assets:
    - shorebird.yaml
  uses-material-design: true
